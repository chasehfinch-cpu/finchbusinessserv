<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <meta name="description" content="Finch Business Services — Management &amp; Consulting Services." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="/" aria-label="Finch Business Services">
        <span class="brand-name">Finch Business Services</span>

    </div>

  <main>

        <h2 id="projects-heading" class="section-title">Ongoing Projects</h2>
        <p class="section-note">No active engagements listed at this time.</p>
        <div class="project-grid" role="list">

          <article class="project-card" role="listitem">
            <img src="assets/project-logo.svg" alt="" class="project-logo" />
            <h3 class="project-name">Project Name</h3>
          </article>

  <footer class="site-footer">
